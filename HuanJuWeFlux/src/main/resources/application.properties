spring.application.name=HuanJuWeFlux

# 启用 SQL 脚本初始化
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# R2DBC MySQL 配置
spring.r2dbc.url=r2dbc:mysql://localhost:3306/huan_ju_flux?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
spring.r2dbc.username=root
spring.r2dbc.password=password
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=30
spring.r2dbc.pool.max-idle-time=30m
# R2DBC连接池配置
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.max-create-connection-time=10s
spring.r2dbc.pool.max-acquire-time=10s

# ========== MongoDB 配置 ==========
spring.data.mongodb.uri=mongodb://localhost:27017/huan_ju_flux
spring.data.mongodb.repositories.enabled=true

# ========== RabbitMQ 配置 ==========
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
# RabbitMQ 连接配置
spring.rabbitmq.connection-timeout=5s
spring.rabbitmq.channel-rpc-timeout=5s

# ========== WebSocket 配置 ==========
websocket.path=/im
websocket.max-frame-size=65536

# ========== 应用特定配置 ==========
app.im.max-history-messages=100
app.im.heartbeat-interval=30
app.im.offline-message-batch-size=50

# ========== Netty 线程池配置 ==========
spring.reactor.netty.pool.max-connections=1000
spring.reactor.netty.pool.acquire-timeout=5000ms

# ========== 文件上传配置 ==========
spring.codec.max-in-memory-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# JWT 配置
jwt.secret=huanju-secret-key-2024-spring-boot-webflux-reactive
jwt.expiration=86400000
jwt.issuer=HuanJuWeFlux

# WebFlux 配置
# spring.webflux.base-path=/api

# 服务器配置
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# 日期格式化
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# 消息加密配置（生产环境使用更复杂的密码和盐）
security.encryption.password=${ENCRYPTION_PASSWORD:ChangeMeInProduction}
security.encryption.salt=${ENCRYPTION_SALT:ChangeMeInProductionToo}




